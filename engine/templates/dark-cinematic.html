<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Dark Cinematic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'DM Sans', Impact, sans-serif;
    }

    /* Fundo com vinheta radial nas bordas */
    .bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, #181818 0%, #0a0a0a 70%, #000 100%);
    }

    /* Grain overlay - textura de ruído fotográfico */
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Círculo neon colorável centralizado */
    .neon-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 820px;
      height: 820px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, {{ACCENT_COLOR}} 18%, transparent) 0%, transparent 70%);
      filter: blur(60px);
    }

    /* Segundo círculo menor para profundidade */
    .neon-circle-inner {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, {{ACCENT_COLOR}} 30%, transparent) 0%, transparent 60%);
      filter: blur(40px);
    }

    /* Linha de acento horizontal */
    .accent-line {
      position: absolute;
      top: 380px;
      left: 140px;
      right: 140px;
      height: 2px;
      background: linear-gradient(90deg, transparent, {{ACCENT_COLOR}}, transparent);
      opacity: 0.7;
    }

    /* Área de conteúdo principal - safe zone: nada abaixo de 1280px */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 640px; /* 1920 - 1280 = 640px de margem inferior */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 120px 80px 80px;
      text-align: center;
      gap: 0;
    }

    /* Tag de nicho */
    .nicho-tag {
      font-size: 26px;
      font-weight: 700;
      color: {{ACCENT_COLOR}};
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0.9;
    }

    /* Headline principal */
    .headline {
      font-size: 80px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      line-height: 1.05;
      margin-bottom: 40px;
      text-shadow: 0 0 80px color-mix(in srgb, {{ACCENT_COLOR}} 40%, transparent);
    }

    /* Subheadline */
    .subheadline {
      font-size: 38px;
      font-weight: 400;
      color: {{ACCENT_COLOR}};
      line-height: 1.3;
      margin-bottom: 72px;
      opacity: 0.92;
      max-width: 820px;
    }

    /* Separador */
    .separator {
      width: 80px;
      height: 3px;
      background: {{ACCENT_COLOR}};
      margin: 0 auto 72px;
      border-radius: 2px;
    }

    /* Bloco de preço */
    .price-block {
      margin-bottom: 72px;
    }

    .price {
      font-size: 110px;
      font-weight: 900;
      color: {{ACCENT_COLOR}};
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow: 0 0 60px color-mix(in srgb, {{ACCENT_COLOR}} 50%, transparent);
    }

    .price-installment {
      font-size: 32px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 12px;
    }

    /* Botão CTA */
    .cta-button {
      display: inline-block;
      background: {{ACCENT_COLOR}};
      color: #ffffff;
      font-size: 42px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 36px 80px;
      border-radius: 8px;
      box-shadow: 0 0 60px color-mix(in srgb, {{ACCENT_COLOR}} 45%, transparent);
    }
  </style>
</head>
<body>
  <!-- Camadas de fundo -->
  <div class="bg"></div>
  <div class="neon-circle"></div>
  <div class="neon-circle-inner"></div>
  <div class="grain"></div>
  <div class="accent-line"></div>

  <!-- Conteúdo principal (safe zone: acima de 1280px) -->
  <div class="content">
    <div class="nicho-tag">{{NICHO}}</div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <p class="subheadline">{{SUBHEADLINE}}</p>
    <div class="separator"></div>
    <div class="price-block">
      <div class="price">{{PRICE}}</div>
      <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    </div>
    <div class="cta-button">{{CTA}}</div>
  </div>
</body>
</html>
