<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Math Electric</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#06010C;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 20% 30%,rgba(130,0,255,0.18) 0%,transparent 55%),radial-gradient(ellipse 500px 400px at 85% 60%,rgba(255,0,120,0.08) 0%,transparent 50%),#06010C}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:690px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:100px 0 60px}
    .nicho{font-size:18px;font-weight:700;color:#8200FF;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-size:96px;font-weight:900;color:#fff;text-transform:uppercase;line-height:.92;letter-spacing:-.03em;margin-bottom:8px}
    .h2{font-size:96px;font-weight:900;line-height:.92;letter-spacing:-.03em;margin-bottom:48px;background:linear-gradient(90deg,#8200FF,#FF0078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    /* Equações grandes */
    .eq-block{display:flex;flex-direction:column;gap:16px;margin-bottom:52px;width:100%}
    .eq-row{display:flex;align-items:baseline;gap:16px}
    .eq-num{font-size:52px;font-weight:900;color:rgba(255,255,255,.25)}
    .eq-x{font-size:32px;font-weight:300;color:rgba(255,255,255,.2)}
    .eq-price{font-size:52px;font-weight:900;color:rgba(255,255,255,.5)}
    .eq-arr{font-size:36px;color:rgba(255,255,255,.2);margin:0 4px}
    .eq-result{font-size:52px;font-weight:900}
    .eq-result.hi{background:linear-gradient(90deg,#8200FF,#FF0078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .eq-row.big .eq-num{font-size:72px;color:#fff}
    .eq-row.big .eq-result{font-size:72px}
    .start-badge{display:inline-flex;align-items:center;gap:12px;background:rgba(130,0,255,.12);border:1px solid rgba(130,0,255,.3);border-radius:50px;padding:12px 32px;margin-bottom:48px;font-size:24px;color:rgba(255,255,255,.6)}
    .start-badge span{color:#8200FF;font-weight:700}
    .price{font-size:112px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:52px}
    .cta{background:linear-gradient(90deg,#8200FF,#FF0078);color:#fff;font-size:34px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:30px 80px;border-radius:4px}
  </style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">a matemática</div>
    <div class="h2">não mente</div>
    <div class="eq-block">
      <div class="eq-row">
        <span class="eq-num">1</span>
        <span class="eq-x">mentoria</span>
        <span class="eq-arr">›</span>
        <span class="eq-result">R$3.000</span>
      </div>
      <div class="eq-row">
        <span class="eq-num">5</span>
        <span class="eq-x">mentorias</span>
        <span class="eq-arr">›</span>
        <span class="eq-result">R$15.000</span>
      </div>
      <div class="eq-row big">
        <span class="eq-num">10</span>
        <span class="eq-x">mentorias</span>
        <span class="eq-arr">›</span>
        <span class="eq-result hi">R$30.000</span>
      </div>
    </div>
    <div class="start-badge">comece com o Agente Arquiteto agora</div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
