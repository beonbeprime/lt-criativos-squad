<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Checklist Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#F8F7F5;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:#F8F7F5}
    /* Faixa preta no topo */
    .top-bar{position:absolute;top:0;left:0;right:0;height:10px;background:#111}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:640px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:90px 0 60px}
    .nicho{font-size:18px;font-weight:700;color:rgba(0,0,0,.3);letter-spacing:.35em;text-transform:uppercase;margin-bottom:40px}
    .eyebrow{font-size:24px;font-weight:300;color:rgba(0,0,0,.4);margin-bottom:16px}
    .h1{font-size:88px;font-weight:900;color:#111;line-height:.9;text-transform:uppercase;letter-spacing:-.03em;margin-bottom:8px}
    .h2{font-size:88px;font-weight:200;color:#111;line-height:.9;text-transform:uppercase;letter-spacing:-.03em;margin-bottom:52px}
    /* Items simples */
    .list{display:flex;flex-direction:column;gap:0;margin-bottom:60px;width:100%}
    .item{display:flex;align-items:center;gap:20px;padding:24px 0;border-bottom:1px solid rgba(0,0,0,.08)}
    .item:first-child{border-top:1px solid rgba(0,0,0,.08)}
    .i-num{font-size:14px;font-weight:700;color:rgba(0,0,0,.25);width:24px}
    .i-label{font-size:30px;font-weight:400;color:#111;flex:1}
    .price{font-size:110px;font-weight:900;color:#111;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(0,0,0,.3);margin-bottom:52px}
    .cta{background:#111;color:#F8F7F5;font-size:34px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:30px 80px;display:inline-block}
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div><div class="top-bar"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="eyebrow">o que você vai ter ao final</div>
    <div class="h1">sua mentoria</div>
    <div class="h2">estruturada</div>
    <div class="list">
      <div class="item"><span class="i-num">01</span><span class="i-label">Nome da sua mentoria</span></div>
      <div class="item"><span class="i-num">02</span><span class="i-label">Cronograma de aulas</span></div>
      <div class="item"><span class="i-num">03</span><span class="i-label">Precificação em R$2.997</span></div>
      <div class="item"><span class="i-num">04</span><span class="i-label">Proposta pública</span></div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
