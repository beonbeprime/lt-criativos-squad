<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Math Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#0D0D0F;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:#0D0D0F}
    .accent{position:absolute;top:0;right:0;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.03) 0%,transparent 70%)}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:690px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:80px 0 60px}
    .nicho{font-size:18px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.35em;text-transform:uppercase;margin-bottom:60px}
    /* Número grande destaque */
    .hero-num{font-size:200px;font-weight:900;color:rgba(255,255,255,.06);line-height:.8;letter-spacing:-.05em;position:relative;margin-bottom:-20px}
    .hero-label{font-size:32px;font-weight:300;color:rgba(255,255,255,.5);margin-bottom:52px}
    /* Linhas de math simples */
    .math-lines{display:flex;flex-direction:column;gap:20px;margin-bottom:52px}
    .mline{font-size:36px;font-weight:300;color:rgba(255,255,255,.5)}
    .mline b{font-weight:900;color:#fff}
    .mline.big{font-size:52px}
    .mline.big b{background:linear-gradient(90deg,#fff,rgba(255,255,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .divider{width:60px;height:1px;background:rgba(255,255,255,.12);margin:8px 0}
    .start-note{font-size:26px;font-weight:300;color:rgba(255,255,255,.35);margin-bottom:48px}
    .start-note span{color:#fff;font-weight:700}
    .price{font-size:112px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.25);margin-bottom:48px}
    .cta{border:1.5px solid rgba(255,255,255,.3);color:#fff;font-size:34px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:30px 80px}
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div><div class="accent"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="hero-num">10</div>
    <div class="hero-label">mentorias. um número que muda tudo.</div>
    <div class="math-lines">
      <div class="mline"><b>1</b> mentoria = <b>R$3.000</b></div>
      <div class="divider"></div>
      <div class="mline"><b>5</b> mentorias = <b>R$15.000</b></div>
      <div class="divider"></div>
      <div class="mline big"><b>10</b> mentorias = <b>R$30.000</b></div>
    </div>
    <div class="start-note">comece com o Agente Arquiteto</div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
