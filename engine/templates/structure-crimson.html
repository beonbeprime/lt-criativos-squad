<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Crimson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#0A0205;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 50% 30%,rgba(180,10,40,0.15) 0%,transparent 60%),#0A0205}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.12;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    /* Barra esquerda crimson */
    .bar{position:absolute;top:0;left:0;width:6px;height:1240px;background:linear-gradient(180deg,transparent,#B40A28 15%,#E01040 50%,transparent)}
    .content{position:absolute;top:0;left:60px;right:60px;bottom:640px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:120px 60px 60px 80px}
    .icon-wrap{margin-bottom:56px}
    .nicho{font-size:18px;font-weight:700;color:#E01040;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-family:'Playfair Display',serif;font-size:86px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:86px;font-style:italic;color:#E01040;line-height:1.05;margin-bottom:52px}
    .body{font-size:30px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.5;margin-bottom:72px;max-width:820px}
    /* Tag "comece agora" */
    .start-tag{display:inline-flex;align-items:center;gap:16px;margin-bottom:52px}
    .st-bar{width:36px;height:2px;background:#E01040}
    .st-text{font-size:28px;color:rgba(255,255,255,.5)}
    .st-val{font-size:28px;font-weight:700;color:#E01040}
    .price{font-size:116px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:64px}
    .cta{background:#E01040;color:#fff;font-size:36px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:32px 80px;border-radius:2px}
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div><div class="bar"></div>
  <div class="content">
    <div class="icon-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <path d="M8 48L28 16L40 32L48 20L56 48H8Z" stroke="#E01040" stroke-width="2" stroke-linejoin="round" fill="rgba(224,16,64,.06)"/>
        <path d="M8 48H56" stroke="#E01040" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">De mentor sem estrutura</div>
    <div class="h2">a R$2.997 por cliente</div>
    <p class="body">O método que transforma o que você sabe em produto digital de alto valor.</p>
    <div class="start-tag">
      <div class="st-bar"></div>
      <span class="st-text">comece agora</span>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
