<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Neon Urban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #000000;
      font-family: 'Orbitron', 'Exo 2', monospace;
    }

    /* Grid sutil em cinza escuro */
    .bg-grid {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(40, 40, 50, 0.8) 1px, transparent 1px),
        linear-gradient(90deg, rgba(40, 40, 50, 0.8) 1px, transparent 1px);
      background-size: 60px 60px;
      background-color: #000;
    }

    /* Scan lines horizontais muito sutis */
    .scan-lines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.03) 0px,
        rgba(255, 255, 255, 0.03) 1px,
        transparent 1px,
        transparent 4px
      );
      pointer-events: none;
    }

    /* Glow de fundo a partir do centro */
    .bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, {{ACCENT_COLOR}} 12%, transparent) 0%, transparent 65%);
      filter: blur(50px);
    }

    /* Conteúdo - safe zone: nada abaixo de 1280px */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 640px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px 80px 80px;
      text-align: center;
    }

    /* Tag de nicho - digital style */
    .nicho-tag {
      font-family: 'Exo 2', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: {{ACCENT_COLOR}};
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 48px;
      opacity: 0.85;
    }

    /* Borda neon ao redor da headline */
    .headline-wrapper {
      border: 2px solid {{ACCENT_COLOR}};
      padding: 48px 64px;
      margin-bottom: 56px;
      position: relative;
      box-shadow:
        0 0 20px color-mix(in srgb, {{ACCENT_COLOR}} 40%, transparent),
        inset 0 0 20px color-mix(in srgb, {{ACCENT_COLOR}} 10%, transparent);
    }

    /* Cantos cortados para visual tech */
    .headline-wrapper::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      width: 28px;
      height: 28px;
      border-top: 2px solid {{ACCENT_COLOR}};
      border-left: 2px solid {{ACCENT_COLOR}};
      background: #000;
    }

    .headline-wrapper::after {
      content: '';
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 28px;
      height: 28px;
      border-bottom: 2px solid {{ACCENT_COLOR}};
      border-right: 2px solid {{ACCENT_COLOR}};
      background: #000;
    }

    /* Headline - Orbitron uppercase tracking largo */
    .headline {
      font-size: 62px;
      font-weight: 900;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.1;
      text-shadow: 0 0 30px color-mix(in srgb, {{ACCENT_COLOR}} 50%, transparent);
    }

    /* Subheadline - sem efeito neon */
    .subheadline {
      font-family: 'Exo 2', sans-serif;
      font-size: 36px;
      font-weight: 300;
      color: rgba(255,255,255,0.8);
      line-height: 1.35;
      margin-bottom: 72px;
      max-width: 820px;
    }

    /* Linha separadora neon */
    .neon-separator {
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, transparent, {{ACCENT_COLOR}}, transparent);
      box-shadow: 0 0 8px {{ACCENT_COLOR}};
      margin: 0 auto 72px;
    }

    /* Preço digital style - monospace */
    .price-block {
      margin-bottom: 64px;
    }

    .price {
      font-family: 'Orbitron', monospace;
      font-size: 100px;
      font-weight: 900;
      color: {{ACCENT_COLOR}};
      line-height: 1;
      letter-spacing: 0.05em;
      text-shadow:
        0 0 40px color-mix(in srgb, {{ACCENT_COLOR}} 60%, transparent),
        0 0 80px color-mix(in srgb, {{ACCENT_COLOR}} 30%, transparent);
    }

    .price-installment {
      font-family: 'Exo 2', sans-serif;
      font-size: 28px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      margin-top: 14px;
    }

    /* CTA com borda neon glow */
    .cta-button {
      display: inline-block;
      border: 2px solid {{ACCENT_COLOR}};
      color: {{ACCENT_COLOR}};
      font-family: 'Orbitron', monospace;
      font-size: 34px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 32px 72px;
      box-shadow:
        0 0 20px color-mix(in srgb, {{ACCENT_COLOR}} 45%, transparent),
        inset 0 0 16px color-mix(in srgb, {{ACCENT_COLOR}} 12%, transparent);
    }
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="scan-lines"></div>
  <div class="bg-glow"></div>

  <div class="content">
    <div class="nicho-tag">{{NICHO}}</div>
    <div class="headline-wrapper">
      <h1 class="headline">{{HEADLINE}}</h1>
    </div>
    <p class="subheadline">{{SUBHEADLINE}}</p>
    <div class="neon-separator"></div>
    <div class="price-block">
      <div class="price">{{PRICE}}</div>
      <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    </div>
    <div class="cta-button">{{CTA}}</div>
  </div>
</body>
</html>
