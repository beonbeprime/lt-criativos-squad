<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Gold</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#09080a;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 32%,rgba(201,168,76,0.12) 0%,transparent 65%),#09080a}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    /* Linha dourada superior */
    .gold-rule{position:absolute;top:180px;left:80px;right:80px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C 40%,#E8D080 60%,transparent)}
    .gold-rule-b{position:absolute;top:1230px;left:80px;right:80px;height:1px;background:linear-gradient(90deg,transparent,#C9A84C 40%,#E8D080 60%,transparent)}
    .content{position:absolute;top:200px;left:80px;right:80px;bottom:690px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .icon-wrap{margin-bottom:52px}
    .nicho{font-size:18px;font-weight:600;color:#C9A84C;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-family:'Playfair Display',serif;font-size:82px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:82px;font-style:italic;color:#C9A84C;line-height:1.05;margin-bottom:52px}
    .body{font-size:30px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:64px;max-width:820px}
    .start-pill{display:inline-block;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:50px;padding:12px 36px;margin-bottom:56px;font-size:24px;color:#C9A84C;font-weight:600;letter-spacing:.08em}
    .price{font-size:112px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:64px}
    .cta{background:#C9A84C;color:#09080a;font-size:36px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:32px 88px;border-radius:4px}
  </style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div>
  <div class="gold-rule"></div><div class="gold-rule-b"></div>
  <div class="content">
    <div class="icon-wrap">
      <svg width="68" height="68" viewBox="0 0 68 68" fill="none">
        <rect x="12" y="10" width="44" height="48" rx="4" stroke="#C9A84C" stroke-width="2" fill="rgba(201,168,76,.06)"/>
        <path d="M22 24H46" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 32H46" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 40H36" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="50" cy="52" r="10" fill="#09080a" stroke="#C9A84C" stroke-width="1.5"/>
        <path d="M46 52L49 55L54 49" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Estruture a sua mentoria</div>
    <div class="h2">e venda por R$2.997</div>
    <p class="body">Do conhecimento que você já tem ao produto digital pronto para vender.</p>
    <div class="start-pill">comece agora por {{PRICE}}</div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
