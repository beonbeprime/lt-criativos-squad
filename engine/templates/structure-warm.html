<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Warm</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#F5EFE6;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:linear-gradient(150deg,#FAF5EE 0%,#EDE3D4 100%)}
    /* Faixa marrom no topo */
    .top-bar{position:absolute;top:0;left:0;right:0;height:8px;background:#5C3D2E}
    /* Bloco marrom lateral */
    .side-block{position:absolute;top:8px;left:0;width:120px;height:400px;background:#5C3D2E}
    .content{position:absolute;top:0;left:0;right:60px;bottom:640px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;text-align:right;padding:100px 80px 60px 180px}
    .nicho{font-size:18px;font-weight:700;color:#5C3D2E;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-family:'Playfair Display',serif;font-size:82px;font-weight:700;color:#1A0F0A;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:82px;font-style:italic;color:#5C3D2E;line-height:1.05;margin-bottom:48px}
    .body{font-size:30px;font-weight:300;color:rgba(0,0,0,.45);line-height:1.6;margin-bottom:56px;max-width:780px}
    .sep{width:60px;height:2px;background:#5C3D2E;margin:0 0 48px auto}
    .start{font-size:26px;color:rgba(0,0,0,.4);margin-bottom:44px}
    .start span{color:#5C3D2E;font-weight:700}
    .price{font-size:112px;font-weight:700;color:#5C3D2E;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(0,0,0,.3);margin-bottom:64px}
    .cta{background:#5C3D2E;color:#FAF5EE;font-size:34px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:30px 80px;display:inline-block}
  
    /* === REGRAS ANTI-QUEBRA + MARGEM SEGURA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start span,.value,.vr-label+.vr-num,
    .price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label,.accent-text {
      hyphens: none;
      word-break: keep-all;
    }
    /* Distribuição equilibrada de linhas */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2,.accent-text { text-wrap: pretty; }
    /* MARGEM DE SEGURANÇA: nenhum elemento ultrapassa as bordas */
    .content > *, .content { max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .cta, [class*='cta'] { max-width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="bg"></div><div class="top-bar"></div><div class="side-block"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Pare de ensinar</div>
    <div class="h2">de graça</div>
    <p class="body">O que você sabe tem valor real. Estruture sua mentoria e comece a cobrar R$2.997 por cliente.</p>
    <div class="sep"></div>
    <div class="start"><span>comece agora mesmo</span></div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
