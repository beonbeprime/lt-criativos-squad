<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Cobalt Lime</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #020818; font-family: 'DM Sans', sans-serif; }

    .bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 700px 500px at 20% 25%, rgba(0,71,171,0.2) 0%, transparent 55%),
                  radial-gradient(ellipse 400px 400px at 85% 60%, rgba(170,255,0,0.08) 0%, transparent 50%),
                  #020818;
    }

    /* Bloco cobalt superior - elemento editorial */
    .top-strip {
      position: absolute; top: 0; left: 0; right: 0; height: 220px;
      background: #0047AB;
      clip-path: polygon(0 0, 100% 0, 100% 65%, 0 100%);
    }

    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .content {
      position: absolute; top: 240px; left: 80px; right: 80px; bottom: 640px;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    }

    .nicho { font-size: 18px; font-weight: 700; color: #AAFF00; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 56px; }

    /* Headline: peso máximo, linha dupla */
    .headline { font-size: 96px; font-weight: 900; color: #ffffff; line-height: 0.92; letter-spacing: -0.03em; text-transform: uppercase; margin-bottom: 8px; }
    .headline-2 { font-size: 96px; font-weight: 200; color: #AAFF00; line-height: 0.92; letter-spacing: -0.03em; text-transform: uppercase; margin-bottom: 48px; }

    /* Lista de benefícios compacta */
    .benefits { margin-bottom: 72px; }
    .benefit {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 18px;
    }
    .b-dot { width: 8px; height: 8px; background: #AAFF00; border-radius: 50%; flex-shrink: 0; }
    .b-text { font-size: 28px; font-weight: 300; color: rgba(255,255,255,0.55); }
    .b-accent { color: #AAFF00; font-weight: 600; }

    .price { font-size: 108px; font-weight: 900; color: #AAFF00; line-height: 1; letter-spacing: -0.03em; margin-bottom: 12px; }
    .price-installment { font-size: 26px; color: rgba(255,255,255,0.3); margin-bottom: 64px; }

    .cta {
      background: #AAFF00; color: #020818;
      font-size: 36px; font-weight: 900; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 32px 80px; border-radius: 2px;
    }
  
    /* === REGRAS ANTI-QUEBRA + MARGEM SEGURA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start span,.value,.vr-label+.vr-num,
    .price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label,.accent-text {
      hyphens: none;
      word-break: keep-all;
    }
    /* Distribuição equilibrada de linhas */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2,.accent-text { text-wrap: pretty; }
    /* MARGEM DE SEGURANÇA: nenhum elemento ultrapassa as bordas */
    .content > *, .content { max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .cta, [class*='cta'] { max-width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="top-strip"></div>
  <div class="grain"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="headline">Venda sua</div>
    <div class="headline-2">mentoria</div>
    <div class="benefits">
      <div class="benefit"><div class="b-dot"></div><span class="b-text">Organize em <span class="b-accent">8 minutos</span></span></div>
      <div class="benefit"><div class="b-dot"></div><span class="b-text">Cobre <span class="b-accent">R$2.997</span> por cliente</span></div>
      <div class="benefit"><div class="b-dot"></div><span class="b-text">Produto pronto <span class="b-accent">hoje</span></span></div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
