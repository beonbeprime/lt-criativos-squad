<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Indigo Cyan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #060718; font-family: 'DM Sans', sans-serif; }

    .bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 700px 500px at 30% 30%, rgba(65,88,208,0.2) 0%, transparent 60%),
                  radial-gradient(ellipse 500px 400px at 80% 70%, rgba(0,245,212,0.08) 0%, transparent 55%),
                  #060718;
    }

    /* Grid tech */
    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(65,88,208,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(65,88,208,0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 100% 80% at 50% 50%, black 30%, transparent 100%);
    }

    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Barra superior com gradient */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #4158D0, #00F5D4);
    }

    .content {
      position: absolute; top: 0; left: 0; right: 0; bottom: 640px;
      display: flex; flex-direction: column; align-items: flex-start;
      justify-content: center; padding: 120px 80px 80px 80px;
    }

    /* Step indicator */
    .step {
      display: flex; align-items: center; gap: 16px; margin-bottom: 72px;
    }
    .step-num {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #4158D0, #00F5D4);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: #fff;
    }
    .step-text { font-size: 22px; color: rgba(255,255,255,0.4); letter-spacing: 0.15em; text-transform: uppercase; }

    .main-label { font-size: 26px; font-weight: 200; color: rgba(0,245,212,0.7); letter-spacing: 0.05em; margin-bottom: 20px; }

    .headline {
      font-size: 88px; font-weight: 900; color: #ffffff;
      line-height: 0.95; letter-spacing: -0.02em; margin-bottom: 12px;
    }
    .headline-2 {
      font-size: 88px; font-weight: 900; line-height: 0.95; letter-spacing: -0.02em;
      background: linear-gradient(90deg, #4158D0, #00F5D4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 56px;
    }

    .sub {
      font-size: 30px; font-weight: 300; color: rgba(255,255,255,0.4);
      line-height: 1.5; margin-bottom: 80px; max-width: 820px;
      border-left: 2px solid #4158D0; padding-left: 24px;
    }

    .price-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; }
    .price { font-size: 110px; font-weight: 900; color: #00F5D4; line-height: 1; letter-spacing: -0.03em; }
    .price-installment { font-size: 26px; color: rgba(255,255,255,0.3); margin-bottom: 72px; }

    .cta {
      background: linear-gradient(90deg, #4158D0, #00F5D4);
      color: #fff; font-size: 36px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 32px 80px; border-radius: 4px;
    }
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="grid"></div>
  <div class="grain"></div>
  <div class="top-bar"></div>
  <div class="content">
    <div class="step">
      <div class="step-num">8</div>
      <span class="step-text">minutos para mudar tudo</span>
    </div>
    <div class="main-label">Organize. Lance. Venda.</div>
    <div class="headline">Sua mentoria</div>
    <div class="headline-2">por R$2.997</div>
    <p class="sub">Do zero ao produto digital pronto para vender — em menos tempo do que você imagina.</p>
    <div class="price-row">
      <div class="price">{{PRICE}}</div>
    </div>
    <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
