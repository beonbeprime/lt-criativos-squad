<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Math Blue</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#F0F6FF;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:linear-gradient(145deg,#FFFFFF 0%,#E8F2FF 100%)}
    .top-block{position:absolute;top:0;left:0;right:0;height:420px;background:#0A4FCC;clip-path:polygon(0 0,100% 0,100% 78%,0 100%)}
    .top-content{position:absolute;top:80px;left:80px;right:80px}
    .top-nicho{font-size:18px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.35em;text-transform:uppercase;margin-bottom:24px}
    .top-h{font-size:72px;font-weight:900;color:#fff;line-height:.94;text-transform:uppercase;letter-spacing:-.02em}
    .content{position:absolute;top:435px;left:80px;right:80px;bottom:640px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center}
    .sub{font-size:24px;font-weight:300;color:rgba(0,0,0,.4);margin-bottom:36px}
    /* Barras de progresso visual */
    .bars{display:flex;flex-direction:column;gap:20px;margin-bottom:52px;width:100%}
    .bar-row{display:flex;flex-direction:column;gap:8px}
    .bar-label{display:flex;justify-content:space-between;align-items:baseline}
    .bl-qty{font-size:22px;font-weight:700;color:#0A4FCC}
    .bl-val{font-size:32px;font-weight:900;color:#0A4FCC;letter-spacing:-.01em}
    .bar-track{height:12px;background:rgba(10,79,204,.1);border-radius:6px;overflow:hidden}
    .bar-fill-1{width:10%;height:100%;background:#0A4FCC;border-radius:6px}
    .bar-fill-5{width:50%;height:100%;background:#0A4FCC;border-radius:6px}
    .bar-fill-10{width:100%;height:100%;background:linear-gradient(90deg,#0A4FCC,#3D6EE8);border-radius:6px}
    .price{font-size:108px;font-weight:900;color:#0A4FCC;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(0,0,0,.3);margin-bottom:48px}
    .cta{background:#0A4FCC;color:#fff;font-size:34px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:30px 80px;border-radius:4px}
  </style>
</head>
<body>
  <div class="bg"></div><div class="top-block"></div>
  <div class="top-content">
    <div class="top-nicho">{{NICHO}}</div>
    <div class="top-h">Cada mentoria<br>vendida vale</div>
  </div>
  <div class="content">
    <div class="sub">veja o que acontece quando você estrutura e vende</div>
    <div class="bars">
      <div class="bar-row">
        <div class="bar-label"><span class="bl-qty">1 mentoria vendida</span><span class="bl-val">R$3.000</span></div>
        <div class="bar-track"><div class="bar-fill-1"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span class="bl-qty">5 mentorias vendidas</span><span class="bl-val">R$15.000</span></div>
        <div class="bar-track"><div class="bar-fill-5"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span class="bl-qty">10 mentorias vendidas</span><span class="bl-val">R$30.000</span></div>
        <div class="bar-track"><div class="bar-fill-10"></div></div>
      </div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
