<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Checklist Crimson</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#0A0205;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 50% 28%,rgba(180,10,40,0.14) 0%,transparent 60%),#0A0205}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.12;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    .bar{position:absolute;top:0;left:0;width:6px;height:1240px;background:linear-gradient(180deg,transparent,#B40A28 15%,#E01040 50%,transparent)}
    .content{position:absolute;top:0;left:60px;right:60px;bottom:640px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:120px 60px 60px 80px}
    .nicho{font-size:18px;font-weight:700;color:#E01040;letter-spacing:.35em;text-transform:uppercase;margin-bottom:36px}
    .tag{display:inline-block;background:rgba(224,16,64,.1);border:1px solid rgba(224,16,64,.25);border-radius:4px;padding:8px 20px;font-size:22px;color:#E01040;margin-bottom:28px}
    .h1{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:#fff;line-height:1.02;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:80px;font-style:italic;color:#E01040;line-height:1.02;margin-bottom:44px}
    .list{display:flex;flex-direction:column;gap:0;margin-bottom:52px;border:1px solid rgba(224,16,64,.15);border-radius:8px;overflow:hidden}
    .item{display:flex;align-items:center;gap:20px;padding:20px 28px;border-bottom:1px solid rgba(255,255,255,.04)}
    .item:last-child{border-bottom:none}
    .i-dot{width:8px;height:8px;border-radius:50%;background:#E01040;flex-shrink:0}
    .i-label{font-size:30px;font-weight:400;color:#fff;flex:1}
    .i-arrow{color:rgba(255,255,255,.2);font-size:20px}
    .price{font-size:112px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:52px}
    .cta{background:#E01040;color:#fff;font-size:34px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:30px 80px;border-radius:2px}
  
    /* === REGRAS ANTI-QUEBRA + MARGEM SEGURA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start span,.value,.vr-label+.vr-num,
    .price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label,.accent-text {
      hyphens: none;
      word-break: keep-all;
    }
    /* Distribuição equilibrada de linhas */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2,.accent-text { text-wrap: pretty; }
    /* MARGEM DE SEGURANÇA: nenhum elemento ultrapassa as bordas */
    .content > *, .content { max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .cta, [class*='cta'] { max-width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div><div class="bar"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="tag">perdido por onde começar?</div>
    <div class="h1">O Agente Arquiteto</div>
    <div class="h2">resolve em minutos</div>
    <div class="list">
      <div class="item"><div class="i-dot"></div><span class="i-label">Nome da sua mentoria</span><span class="i-arrow">›</span></div>
      <div class="item"><div class="i-dot"></div><span class="i-label">Cronograma de aulas</span><span class="i-arrow">›</span></div>
      <div class="item"><div class="i-dot"></div><span class="i-label">Precificação em R$2.997</span><span class="i-arrow">›</span></div>
      <div class="item"><div class="i-dot"></div><span class="i-label">Proposta pública</span><span class="i-arrow">›</span></div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
