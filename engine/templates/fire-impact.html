<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Fire Impact</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #050505; font-family: 'DM Sans', sans-serif; }

    /* Fundo: preto puro */
    .bg { position: absolute; inset: 0; background: #050505; }

    /* Círculo grande laranja atrás - elemento âncora visual */
    .circle-bg {
      position: absolute;
      top: -120px;
      right: -200px;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,85,0,0.18) 0%, rgba(255,60,0,0.08) 45%, transparent 70%);
      filter: blur(40px);
    }

    /* Anel laranja - borda do círculo */
    .circle-ring {
      position: absolute;
      top: 80px;
      right: -100px;
      width: 660px;
      height: 660px;
      border-radius: 50%;
      border: 2px solid rgba(255,85,0,0.2);
    }

    /* Segundo anel menor */
    .circle-ring-2 {
      position: absolute;
      top: 180px;
      right: 0px;
      width: 460px;
      height: 460px;
      border-radius: 50%;
      border: 1px solid rgba(255,85,0,0.12);
    }

    /* Grain */
    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Linha laranja na esquerda - acento vertical */
    .accent-bar {
      position: absolute;
      top: 220px; left: 80px;
      width: 4px; height: 320px;
      background: linear-gradient(180deg, transparent, #FF5500, #FF8800, transparent);
    }

    /* Conteúdo - safe zone abaixo de 1280px */
    .content {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 640px;
      display: flex; flex-direction: column;
      align-items: flex-start; justify-content: center;
      padding: 140px 80px 80px 120px;
    }

    .nicho {
      font-size: 20px; font-weight: 700; color: #FF5500;
      letter-spacing: 0.35em; text-transform: uppercase;
      margin-bottom: 64px; opacity: 0.9;
    }

    /* Headline: grande, branco puro, peso máximo */
    .headline {
      font-size: 104px; font-weight: 900; color: #ffffff;
      text-transform: uppercase; line-height: 0.92;
      letter-spacing: -0.02em; margin-bottom: 0;
    }

    /* Segunda linha da headline em laranja */
    .headline-accent {
      font-size: 104px; font-weight: 900; color: #FF5500;
      text-transform: uppercase; line-height: 0.92;
      letter-spacing: -0.02em; margin-bottom: 56px;
    }

    .subheadline {
      font-size: 32px; font-weight: 300; color: rgba(255,255,255,0.5);
      line-height: 1.5; margin-bottom: 80px;
      max-width: 760px;
    }

    /* Preço */
    .price-row { display: flex; align-items: center; gap: 28px; margin-bottom: 16px; }

    .price-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: #FF5500; flex-shrink: 0;
    }

    .price {
      font-size: 100px; font-weight: 900; color: #ffffff;
      line-height: 1; letter-spacing: -0.03em;
    }

    .price-installment {
      font-size: 28px; font-weight: 300; color: rgba(255,255,255,0.35);
      margin-bottom: 72px; padding-left: 40px;
    }

    /* CTA: outline laranja limpo */
    .cta {
      border: 2px solid #FF5500; color: #FF5500;
      font-size: 36px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 32px 80px; display: inline-block;
      background: transparent;
      transition: none;
    }
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="circle-bg"></div>
  <div class="circle-ring"></div>
  <div class="circle-ring-2"></div>
  <div class="grain"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="nicho">{{NICHO}}</div>

    <div class="headline">{{HEADLINE}}</div>
    <div class="headline-accent">{{SUBHEADLINE}}</div>

    <p class="subheadline">Mentoria de R$2.997 entregue em minutos.</p>

    <div class="price-row">
      <div class="price-dot"></div>
      <div class="price">{{PRICE}}</div>
    </div>
    <div class="price-installment">{{PRICE_INSTALLMENT}}</div>

    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
