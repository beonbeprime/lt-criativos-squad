<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Math Warm</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;600;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#F5EFE6;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:linear-gradient(150deg,#FAF5EE 0%,#EDE3D4 100%)}
    .top-bar{position:absolute;top:0;left:0;right:0;height:8px;background:#5C3D2E}
    .side-block{position:absolute;top:8px;left:0;width:120px;height:500px;background:#5C3D2E}
    .content{position:absolute;top:0;left:0;right:60px;bottom:640px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;text-align:right;padding:100px 80px 60px 200px}
    .nicho{font-size:18px;font-weight:700;color:#5C3D2E;letter-spacing:.35em;text-transform:uppercase;margin-bottom:36px}
    .h1{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:#1A0F0A;line-height:1.02;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:80px;font-style:italic;color:#5C3D2E;line-height:1.02;margin-bottom:44px}
    /* Blocos de math alinhados à direita */
    .math-rows{display:flex;flex-direction:column;gap:0;margin-bottom:52px;width:100%}
    .mrow{display:flex;align-items:baseline;justify-content:flex-end;gap:16px;padding:18px 0;border-bottom:1px solid rgba(92,61,46,.1)}
    .mrow:first-child{border-top:1px solid rgba(92,61,46,.1)}
    .mr-qty{font-size:28px;font-weight:300;color:rgba(0,0,0,.4)}
    .mr-arr{font-size:24px;color:rgba(92,61,46,.3)}
    .mr-val{font-size:44px;font-weight:700;color:#5C3D2E;min-width:200px;text-align:right}
    .mrow.big .mr-val{font-size:60px;color:#1A0F0A}
    .note{font-size:22px;font-weight:300;color:rgba(0,0,0,.4);margin-bottom:44px;line-height:1.5}
    .note b{color:#5C3D2E;font-weight:700}
    .price{font-size:108px;font-weight:700;color:#5C3D2E;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(0,0,0,.3);margin-bottom:52px}
    .cta{background:#5C3D2E;color:#FAF5EE;font-size:34px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:30px 80px;display:inline-block}
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div><div class="top-bar"></div><div class="side-block"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Você só precisa</div>
    <div class="h2">de 10 clientes</div>
    <div class="math-rows">
      <div class="mrow"><span class="mr-qty">1 mentoria</span><span class="mr-arr">›</span><span class="mr-val">R$3.000</span></div>
      <div class="mrow"><span class="mr-qty">5 mentorias</span><span class="mr-arr">›</span><span class="mr-val">R$15.000</span></div>
      <div class="mrow big"><span class="mr-qty">10 mentorias</span><span class="mr-arr">›</span><span class="mr-val">R$30.000</span></div>
    </div>
    <div class="note">comece a estruturar com o<br>Agente Arquiteto hoje mesmo</div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
