<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Copper</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#080604;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 30%,rgba(184,115,51,0.14) 0%,transparent 60%),#080604}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.12;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:640px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 60px 60px}
    .icon-wrap{margin-bottom:60px}
    .nicho{font-size:18px;font-weight:700;color:#B87333;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-family:'Playfair Display',serif;font-size:82px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:82px;font-style:italic;background:linear-gradient(135deg,#B87333,#E8A96B,#B87333);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.05;margin-bottom:56px}
    .body{font-size:30px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:52px;max-width:820px}
    /* Três colunas de benefícios */
    .benefits{display:flex;justify-content:center;gap:48px;margin-bottom:60px}
    .benefit{display:flex;flex-direction:column;align-items:center;gap:8px}
    .b-icon{width:48px;height:48px;border-radius:50%;border:1px solid rgba(184,115,51,.3);display:flex;align-items:center;justify-content:center}
    .b-label{font-size:20px;font-weight:300;color:rgba(255,255,255,.4);text-align:center}
    .b-val{font-size:22px;font-weight:700;color:#B87333;text-align:center}
    .price{font-size:112px;font-weight:900;line-height:1;letter-spacing:-.03em;margin-bottom:10px;background:linear-gradient(135deg,#B87333,#E8A96B,#B87333);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:60px}
    .cta{background:transparent;border:1.5px solid #B87333;color:#B87333;font-size:34px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:30px 80px}
  
    /* === REGRAS ANTI-QUEBRA + MARGEM SEGURA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start span,.value,.vr-label+.vr-num,
    .price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label,.accent-text {
      hyphens: none;
      word-break: keep-all;
    }
    /* Distribuição equilibrada de linhas */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2,.accent-text { text-wrap: pretty; }
    /* MARGEM DE SEGURANÇA: nenhum elemento ultrapassa as bordas */
    .content > *, .content { max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .cta, [class*='cta'] { max-width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div>
  <div class="content">
    <div class="icon-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <path d="M36 12L58 26V46L36 60L14 46V26L36 12Z" stroke="#B87333" stroke-width="2" stroke-linejoin="round" fill="rgba(184,115,51,.06)"/>
        <path d="M26 36L32 42L46 28" stroke="#B87333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Estruture a sua mentoria</div>
    <div class="h2">e venda por R$2.997</div>
    <p class="body">Do conhecimento ao produto digital — organizado, estruturado, pronto para vender.</p>
    <div class="benefits">
      <div class="benefit">
        <div class="b-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11L8.5 15.5L18 6" stroke="#B87333" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <span class="b-label">organize em</span>
        <span class="b-val">8 min</span>
      </div>
      <div class="benefit">
        <div class="b-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11L8.5 15.5L18 6" stroke="#B87333" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <span class="b-label">venda por</span>
        <span class="b-val">R$2.997</span>
      </div>
      <div class="benefit">
        <div class="b-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 11L8.5 15.5L18 6" stroke="#B87333" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <span class="b-label">comece por</span>
        <span class="b-val">R$67</span>
      </div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
