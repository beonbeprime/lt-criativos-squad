<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Checklist Violet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#0D0A1A;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 900px 700px at 50% 25%,rgba(100,40,220,0.15) 0%,transparent 60%),#0D0A1A}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:690px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 40px 60px}
    .nicho{font-size:18px;font-weight:700;color:#8B5CF6;letter-spacing:.35em;text-transform:uppercase;margin-bottom:36px}
    .h1{font-family:'Playfair Display',serif;font-size:76px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:76px;font-style:italic;background:linear-gradient(135deg,#8B5CF6,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.05;margin-bottom:44px}
    /* Grid 2x2 de cards */
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:52px;width:100%}
    .card{background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:12px;padding:28px 24px;text-align:left}
    .card-icon{width:36px;height:36px;border-radius:8px;background:rgba(139,92,246,.15);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .card-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px}
    .card-desc{font-size:18px;font-weight:300;color:rgba(255,255,255,.4)}
    .price{font-size:108px;font-weight:900;line-height:1;letter-spacing:-.03em;margin-bottom:10px;background:linear-gradient(135deg,#8B5CF6,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:48px}
    .cta{background:linear-gradient(135deg,#7C3AED,#9333EA);color:#fff;font-size:34px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:30px 80px;border-radius:8px}
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Tudo que falta para</div>
    <div class="h2">vender R$2.997</div>
    <div class="grid">
      <div class="card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 3L18 8V14L10 19L2 14V8L10 3Z" stroke="#8B5CF6" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </div>
        <div class="card-title">Nome da<br>mentoria</div>
        <div class="card-desc">identidade de marca</div>
      </div>
      <div class="card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="#8B5CF6" stroke-width="1.5"/><path d="M7 2V6M13 2V6M3 9H17" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="card-title">Cronograma<br>de aulas</div>
        <div class="card-desc">estrutura completa</div>
      </div>
      <div class="card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="#8B5CF6" stroke-width="1.5"/><path d="M10 7V10L12 12" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="card-title">Precificação</div>
        <div class="card-desc">R$2.997 por cliente</div>
      </div>
      <div class="card">
        <div class="card-icon">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M4 15L7 12L10 14L14 9L17 11" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 5H17M3 8H12" stroke="#8B5CF6" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div class="card-title">Proposta<br>pública</div>
        <div class="card-desc">posicionamento</div>
      </div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
