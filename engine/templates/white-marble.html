<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>White Marble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Playfair Display', Georgia, serif;
    }

    /* Fundo mármore: gradiente simulando veios */
    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(220,215,210,0.4) 0%, transparent 50%),
        linear-gradient(250deg, rgba(200,195,190,0.3) 10%, transparent 55%),
        linear-gradient(45deg, rgba(235,232,228,0.5) 20%, transparent 60%),
        linear-gradient(160deg, rgba(210,205,200,0.25) 5%, transparent 40%),
        #f0ece6;
    }

    /* Veio de mármore secundário */
    .veio-1 {
      position: absolute;
      top: 0;
      left: 30%;
      width: 2px;
      height: 100%;
      background: linear-gradient(180deg, transparent, rgba(180,170,160,0.2) 30%, rgba(160,150,140,0.15) 60%, transparent);
      transform: rotate(-8deg) translateX(-50px);
    }

    .veio-2 {
      position: absolute;
      top: 0;
      left: 65%;
      width: 1px;
      height: 100%;
      background: linear-gradient(180deg, transparent, rgba(180,170,160,0.15) 40%, transparent);
      transform: rotate(5deg);
    }

    /* Linha dourada topo */
    .gold-line-top {
      position: absolute;
      top: 100px;
      left: 100px;
      right: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C9A84C, #E8C975, #C9A84C, transparent);
    }

    /* Linha dourada bottom (dentro da safe zone) */
    .gold-line-bottom {
      position: absolute;
      top: 1200px;
      left: 100px;
      right: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C9A84C, #E8C975, #C9A84C, transparent);
    }

    /* Ornamento central dourado */
    .ornament {
      position: absolute;
      top: 96px;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 18px;
      background: #C9A84C;
      rotate: 45deg;
    }

    /* Conteúdo - safe zone: nada abaixo de 1280px */
    .content {
      position: absolute;
      top: 160px;
      left: 80px;
      right: 80px;
      bottom: 720px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Tag de nicho */
    .nicho-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: #C9A84C;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    /* Headline */
    .headline {
      font-size: 72px;
      font-weight: 700;
      font-style: italic;
      color: #C9A84C;
      line-height: 1.1;
      margin-bottom: 44px;
      text-shadow: 0 2px 8px rgba(180,140,40,0.15);
    }

    /* Linha decorativa entre headline e subheadline */
    .deco-line {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 44px;
    }

    .deco-line::before,
    .deco-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A84C);
    }

    .deco-line::after {
      background: linear-gradient(90deg, #C9A84C, transparent);
    }

    .deco-diamond {
      width: 10px;
      height: 10px;
      background: #C9A84C;
      rotate: 45deg;
      flex-shrink: 0;
    }

    /* Subheadline */
    .subheadline {
      font-family: 'DM Sans', sans-serif;
      font-size: 36px;
      font-weight: 300;
      color: #1a1a1a;
      line-height: 1.4;
      margin-bottom: 80px;
      max-width: 820px;
    }

    /* Bloco de preço */
    .price-block {
      border: 1.5px solid #C9A84C;
      padding: 36px 72px;
      margin-bottom: 64px;
      position: relative;
    }

    /* Pequenos ornamentos nos cantos */
    .price-block::before,
    .price-block::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #C9A84C;
      rotate: 45deg;
    }

    .price-block::before {
      top: -8px;
      left: -8px;
    }

    .price-block::after {
      bottom: -8px;
      right: -8px;
    }

    .price {
      font-size: 96px;
      font-weight: 700;
      color: #C9A84C;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .price-installment {
      font-family: 'DM Sans', sans-serif;
      font-size: 30px;
      font-weight: 300;
      color: #555;
      margin-top: 10px;
    }

    /* Botão CTA */
    .cta-button {
      display: inline-block;
      background: #1a1a1a;
      color: #C9A84C;
      font-family: 'DM Sans', sans-serif;
      font-size: 36px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 32px 80px;
      border: 1px solid #C9A84C;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="veio-1"></div>
  <div class="veio-2"></div>
  <div class="gold-line-top"></div>
  <div class="gold-line-bottom"></div>
  <div class="ornament"></div>

  <div class="content">
    <div class="nicho-tag">{{NICHO}}</div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <div class="deco-line"><div class="deco-diamond"></div></div>
    <p class="subheadline">{{SUBHEADLINE}}</p>
    <div class="price-block">
      <div class="price">{{PRICE}}</div>
      <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    </div>
    <div class="cta-button">{{CTA}}</div>
  </div>
</body>
</html>
