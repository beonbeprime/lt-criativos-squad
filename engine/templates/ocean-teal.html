<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Ocean Teal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #020E18; font-family: 'DM Sans', sans-serif; }

    .bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 800px 600px at 60% 25%, rgba(0,119,255,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 600px 400px at 20% 80%, rgba(0,201,167,0.1) 0%, transparent 55%),
                  #020E18;
    }

    /* Número grande como elemento gráfico de fundo */
    .deco-value {
      position: absolute; top: 120px; right: -40px;
      font-size: 420px; font-weight: 900; line-height: 1;
      color: rgba(0,201,167,0.04); letter-spacing: -0.05em;
      user-select: none; white-space: nowrap;
    }

    /* Linha horizontal de separação */
    .h-line { position: absolute; width: 100%; height: 1px; background: linear-gradient(90deg, rgba(0,119,255,0.2), rgba(0,201,167,0.2), transparent); }
    .h-line-1 { top: 280px; }
    .h-line-2 { top: 1240px; }

    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .content {
      position: absolute; top: 300px; left: 80px; right: 80px; bottom: 680px;
      display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
    }

    .nicho { font-size: 18px; font-weight: 700; color: #00C9A7; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 52px; }

    .headline-sm { font-size: 36px; font-weight: 300; color: rgba(255,255,255,0.5); margin-bottom: 12px; }

    .headline {
      font-size: 100px; font-weight: 900; color: #ffffff;
      line-height: 0.9; letter-spacing: -0.03em; margin-bottom: 12px;
    }

    .headline-accent {
      font-size: 100px; font-weight: 200; line-height: 0.9; letter-spacing: -0.03em;
      background: linear-gradient(90deg, #0077FF, #00C9A7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 56px;
    }

    /* Separador + tagline */
    .tagline-row { display: flex; align-items: center; gap: 20px; margin-bottom: 80px; }
    .tagline-bar { width: 40px; height: 2px; background: #00C9A7; }
    .tagline { font-size: 30px; font-weight: 300; color: rgba(255,255,255,0.45); }

    /* Bloco de preço */
    .price-block {
      display: flex; align-items: flex-end; gap: 20px; margin-bottom: 16px;
    }
    .price { font-size: 108px; font-weight: 900; color: #00C9A7; line-height: 1; letter-spacing: -0.03em; }
    .price-side { padding-bottom: 16px; }
    .price-label { font-size: 18px; font-weight: 500; color: rgba(255,255,255,0.3); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 4px; }
    .price-installment { font-size: 26px; font-weight: 300; color: rgba(255,255,255,0.3); margin-bottom: 72px; }

    .cta {
      border: 1.5px solid #00C9A7; color: #00C9A7;
      font-size: 34px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 30px 80px; display: inline-block;
    }
  
    /* === REGRAS ANTI-QUEBRA + MARGEM SEGURA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start span,.value,.vr-label+.vr-num,
    .price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label,.accent-text {
      hyphens: none;
      word-break: keep-all;
    }
    /* Distribuição equilibrada de linhas */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2,.accent-text { text-wrap: pretty; }
    /* MARGEM DE SEGURANÇA: nenhum elemento ultrapassa as bordas */
    .content > *, .content { max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .cta, [class*='cta'] { max-width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="deco-value">2997</div>
  <div class="h-line h-line-1"></div>
  <div class="h-line h-line-2"></div>
  <div class="grain"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="headline-sm">Venda sua mentoria</div>
    <div class="headline">por</div>
    <div class="headline-accent">R$2.997</div>
    <div class="tagline-row">
      <div class="tagline-bar"></div>
      <span class="tagline">Organize seu conhecimento em 8 minutos</span>
    </div>
    <div class="price-block">
      <div class="price">{{PRICE}}</div>
      <div class="price-side">
        <div class="price-label">investimento</div>
      </div>
    </div>
    <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
