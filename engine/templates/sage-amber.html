<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Sage Amber</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #060D07; font-family: 'DM Sans', sans-serif; }

    .bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 700px 500px at 50% 35%, rgba(76,175,87,0.1) 0%, transparent 60%),
                  radial-gradient(ellipse 400px 300px at 80% 75%, rgba(255,193,7,0.07) 0%, transparent 50%),
                  #060D07;
    }

    /* Arco decorativo sutil */
    .arc {
      position: absolute; top: -300px; left: -300px;
      width: 1200px; height: 1200px; border-radius: 50%;
      border: 1px solid rgba(76,175,87,0.08);
    }
    .arc-2 {
      position: absolute; top: -100px; left: -100px;
      width: 800px; height: 800px; border-radius: 50%;
      border: 1px solid rgba(255,193,7,0.06);
    }

    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .content {
      position: absolute; top: 0; left: 0; right: 0; bottom: 640px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 120px 80px 60px;
    }

    /* Ícone central */
    .icon-wrap { margin-bottom: 56px; }

    .nicho { font-size: 18px; font-weight: 600; color: #4CAF57; letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 40px; }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: 78px; font-weight: 700; color: #ffffff;
      line-height: 1.1; margin-bottom: 24px;
    }

    /* Valor em destaque âmbar */
    .value-highlight {
      display: inline-flex; align-items: center; gap: 16px;
      margin-bottom: 48px;
    }
    .vh-line { width: 48px; height: 1px; background: #FFC107; }
    .vh-text {
      font-family: 'Playfair Display', serif;
      font-size: 56px; font-style: italic; color: #FFC107;
    }

    .body { font-size: 30px; font-weight: 300; color: rgba(255,255,255,0.4); line-height: 1.6; margin-bottom: 72px; max-width: 800px; }

    /* Separador orgânico */
    .organic-sep { display: flex; align-items: center; gap: 20px; margin-bottom: 60px; width: 100%; }
    .org-line-l { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(76,175,87,0.3)); }
    .org-line-r { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(76,175,87,0.3), transparent); }
    .org-icon { }

    .price { font-size: 112px; font-weight: 700; color: #4CAF57; line-height: 1; letter-spacing: -0.03em; margin-bottom: 12px; }
    .price-installment { font-size: 28px; color: rgba(255,255,255,0.3); margin-bottom: 72px; }

    .cta {
      border: 2px solid #FFC107; color: #FFC107;
      font-size: 34px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 32px 80px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="arc"></div>
  <div class="arc-2"></div>
  <div class="grain"></div>
  <div class="content">
    <div class="icon-wrap">
      <!-- Ícone: planta/crescimento -->
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <path d="M36 60V30" stroke="#4CAF57" stroke-width="2" stroke-linecap="round"/>
        <path d="M36 30C36 20 28 14 18 16C20 26 28 30 36 30Z" stroke="#4CAF57" stroke-width="2" stroke-linejoin="round" fill="rgba(76,175,87,0.1)"/>
        <path d="M36 38C36 28 44 22 54 24C52 34 44 38 36 38Z" stroke="#4CAF57" stroke-width="2" stroke-linejoin="round" fill="rgba(76,175,87,0.1)"/>
        <path d="M24 60H48" stroke="#FFC107" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="nicho">{{NICHO}}</div>
    <div class="headline">Venda sua mentoria</div>
    <div class="value-highlight">
      <div class="vh-line"></div>
      <span class="vh-text">por R$2.997</span>
      <div class="vh-line"></div>
    </div>
    <p class="body">Organize seu conhecimento em 8 minutos e transforme o que você já sabe em renda real.</p>
    <div class="organic-sep">
      <div class="org-line-l"></div>
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="4" fill="#FFC107" opacity="0.6"/></svg>
      <div class="org-line-r"></div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
