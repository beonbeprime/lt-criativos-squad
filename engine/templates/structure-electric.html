<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Electric</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#06010C;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 20% 30%,rgba(130,0,255,0.2) 0%,transparent 55%),radial-gradient(ellipse 500px 400px at 85% 60%,rgba(255,0,120,0.1) 0%,transparent 50%),#06010C}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    /* Linha diagonal neon */
    .neon-line{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden}
    .neon-line::before{content:'';position:absolute;top:300px;left:-200px;width:1400px;height:1px;background:linear-gradient(90deg,transparent,rgba(130,0,255,0.4),rgba(255,0,120,0.4),transparent);transform:rotate(-8deg)}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:640px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:120px 0 60px}
    .nicho{font-size:18px;font-weight:700;color:#8200FF;letter-spacing:.35em;text-transform:uppercase;margin-bottom:52px}
    .h1{font-size:100px;font-weight:900;color:#fff;text-transform:uppercase;line-height:.92;letter-spacing:-.03em;margin-bottom:8px}
    .h2{font-size:100px;font-weight:900;line-height:.92;letter-spacing:-.03em;margin-bottom:8px;background:linear-gradient(90deg,#8200FF,#FF0078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .h3{font-size:56px;font-weight:200;color:rgba(255,255,255,.3);text-transform:uppercase;line-height:1;margin-bottom:56px;letter-spacing:.02em}
    .value{font-size:44px;font-weight:700;margin-bottom:72px;background:linear-gradient(90deg,#8200FF,#FF0078);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .start-badge{display:inline-flex;align-items:center;gap:12px;background:rgba(130,0,255,.12);border:1px solid rgba(130,0,255,.3);border-radius:50px;padding:12px 32px;margin-bottom:52px;font-size:24px;color:rgba(255,255,255,.6)}
    .start-badge span{color:#8200FF;font-weight:700}
    .price{font-size:116px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:64px}
    .cta{background:linear-gradient(90deg,#8200FF,#FF0078);color:#fff;font-size:36px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:32px 80px;border-radius:4px}
  </style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div><div class="neon-line"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Estruture</div>
    <div class="h2">sua mentoria</div>
    <div class="h3">e venda por</div>
    <div class="value">R$2.997 por cliente</div>
    <div class="start-badge">comece agora por <span>{{PRICE}}</span></div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
