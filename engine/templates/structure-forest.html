<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Forest</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;600;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#050E07;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 50% 30%,rgba(30,100,50,0.18) 0%,transparent 60%),#050E07}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    /* Quadrado dourado no canto */
    .corner{position:absolute;top:0;right:0;width:200px;height:200px;background:#C9A84C;clip-path:polygon(100% 0,100% 100%,0 0)}
    .content{position:absolute;top:0;left:80px;right:80px;bottom:640px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:140px 60px 60px}
    .icon-wrap{margin-bottom:56px}
    .nicho{font-size:18px;font-weight:600;color:#3DB560;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:80px;font-style:italic;color:#C9A84C;line-height:1.05;margin-bottom:48px}
    .deco{display:flex;align-items:center;gap:16px;margin-bottom:48px;justify-content:center}
    .deco-line{width:60px;height:1px;background:rgba(61,181,96,.3)}
    .deco-txt{font-size:24px;font-weight:300;color:rgba(255,255,255,.35);letter-spacing:.1em}
    .body{font-size:30px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:64px;max-width:820px}
    .start{font-size:28px;color:#3DB560;font-weight:600;margin-bottom:48px;letter-spacing:.05em}
    .price{font-size:112px;font-weight:900;color:#C9A84C;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:64px}
    .cta{background:#3DB560;color:#050E07;font-size:36px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:32px 88px;border-radius:4px}
  
    /* === REGRAS ANTI-QUEBRA + MARGEM SEGURA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start span,.value,.vr-label+.vr-num,
    .price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label,.accent-text {
      hyphens: none;
      word-break: keep-all;
    }
    /* Distribuição equilibrada de linhas */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2,.accent-text { text-wrap: pretty; }
    /* MARGEM DE SEGURANÇA: nenhum elemento ultrapassa as bordas */
    .content > *, .content { max-width: 100%; box-sizing: border-box; overflow: hidden; }
    .cta, [class*='cta'] { max-width: 100%; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div><div class="corner"></div>
  <div class="content">
    <div class="icon-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <path d="M36 8L60 28V64H12V28L36 8Z" stroke="#3DB560" stroke-width="2" stroke-linejoin="round" fill="rgba(61,181,96,.06)"/>
        <path d="M26 64V44H46V64" stroke="#3DB560" stroke-width="2" stroke-linejoin="round"/>
        <path d="M28 36H44" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M28 28H44" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">8 minutos para estruturar</div>
    <div class="h2">e vender por R$2.997</div>
    <div class="deco"><div class="deco-line"></div><span class="deco-txt">comece agora</span><div class="deco-line"></div></div>
    <p class="body">Organize, precifique e venda sua mentoria. Mais simples do que você imagina.</p>
    <div class="start">comece agora</div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
