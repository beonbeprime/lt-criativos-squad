<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Blue</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@200;300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#03061A;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 800px 500px at 50% 25%,rgba(30,80,220,0.18) 0%,transparent 60%),#03061A}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.08;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    /* Bloco azul no topo - editorial */
    .top{position:absolute;top:0;left:0;right:0;height:320px;background:linear-gradient(160deg,#1E50DC,#0A1A6E)}
    .top-content{position:absolute;top:0;left:80px;right:80px;height:320px;display:flex;flex-direction:column;justify-content:center}
    .top-label{font-size:18px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.3em;text-transform:uppercase;margin-bottom:16px}
    .top-headline{font-size:76px;font-weight:900;color:#fff;line-height:.95;text-transform:uppercase;letter-spacing:-.02em}
    /* Conteúdo principal */
    .content{position:absolute;top:360px;left:80px;right:80px;bottom:640px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center}
    .accent{font-size:40px;font-weight:200;color:rgba(255,255,255,.4);margin-bottom:16px}
    .value{font-size:88px;font-weight:900;background:linear-gradient(90deg,#1E50DC,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;letter-spacing:-.03em;margin-bottom:56px}
    .body{font-size:30px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.5;margin-bottom:72px;border-left:3px solid #1E50DC;padding-left:24px}
    /* Badge "comece agora" */
    .badge{display:inline-flex;align-items:center;gap:12px;margin-bottom:48px}
    .badge-icon{width:40px;height:40px;border-radius:50%;background:#1E50DC;display:flex;align-items:center;justify-content:center}
    .badge-text{font-size:26px;color:rgba(255,255,255,.6)}
    .badge-price{font-size:26px;font-weight:700;color:#60A5FA}
    .price{font-size:112px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:64px}
    .cta{background:#1E50DC;color:#fff;font-size:36px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:32px 80px;border-radius:4px}
  </style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div>
  <div class="top"></div>
  <div class="top-content">
    <div class="top-label">{{NICHO}}</div>
    <div class="top-headline">Estruture<br>sua mentoria</div>
  </div>
  <div class="content">
    <div class="accent">e venda</div>
    <div class="value">por R$2.997</div>
    <p class="body">Do conhecimento que você já tem ao produto digital pronto para vender.</p>
    <div class="badge">
      <div class="badge-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 9L7.5 12.5L14 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="badge-text">acesso imediato</span>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
