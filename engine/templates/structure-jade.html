<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Structure Jade</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#030E0A;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 50% 30%,rgba(0,150,100,0.15) 0%,transparent 60%),#030E0A}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    /* Linhas duplas decorativas */
    .double-rule{position:absolute;left:80px;right:80px}
    .dr1{top:175px} .dr2{top:179px} .dr3{top:1228px} .dr4{top:1232px}
    .double-rule{height:1px;background:rgba(0,150,100,.25)}
    .content{position:absolute;top:200px;left:80px;right:80px;bottom:690px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .icon-wrap{margin-bottom:52px}
    .nicho{font-size:18px;font-weight:700;color:#00A878;letter-spacing:.35em;text-transform:uppercase;margin-bottom:44px}
    .h1{font-family:'Playfair Display',serif;font-size:80px;font-weight:700;color:#fff;line-height:1.05;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:80px;font-style:italic;color:#00C896;line-height:1.05;margin-bottom:48px}
    .body{font-size:30px;font-weight:300;color:rgba(255,255,255,.4);line-height:1.6;margin-bottom:52px;max-width:820px}
    /* Tag "comece agora" */
    .start-tag{background:rgba(0,168,120,.12);border:1px solid rgba(0,168,120,.25);border-radius:8px;padding:16px 40px;margin-bottom:52px;font-size:26px;color:#00A878;display:inline-block}
    .start-tag b{color:#fff}
    .price{font-size:112px;font-weight:900;color:#00C896;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:64px}
    .cta{border:2px solid #00A878;color:#00A878;font-size:34px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:30px 80px}
  </style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div>
  <div class="double-rule dr1"></div><div class="double-rule dr2"></div>
  <div class="double-rule dr3"></div><div class="double-rule dr4"></div>
  <div class="content">
    <div class="icon-wrap">
      <svg width="68" height="68" viewBox="0 0 68 68" fill="none">
        <path d="M34 8L60 24V44L34 60L8 44V24L34 8Z" stroke="#00A878" stroke-width="2" stroke-linejoin="round" fill="rgba(0,168,120,.06)"/>
        <path d="M34 8V60" stroke="#00A878" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <path d="M8 24L60 44" stroke="#00A878" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <path d="M8 44L60 24" stroke="#00A878" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
      </svg>
    </div>
    <div class="nicho">{{NICHO}}</div>
    <div class="h1">Organize o que você sabe.</div>
    <div class="h2">Venda por R$2.997.</div>
    <p class="body">Sua mentoria já vale R$2.997. Só falta estrutura para provar isso ao mercado.</p>
    <div class="start-tag">Agente Arquiteto</div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
