<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Frost Violet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #F8F6FF; font-family: 'DM Sans', sans-serif; }

    .bg { position: absolute; inset: 0; background: linear-gradient(155deg, #FFFFFF 0%, #EDE8FF 100%); }

    /* Bloco violeta no canto superior */
    .corner-block {
      position: absolute; top: 0; right: 0;
      width: 340px; height: 340px;
      background: #5B21B6; clip-path: polygon(100% 0, 100% 100%, 0 0);
    }

    /* Número decorativo grande */
    .deco-num {
      position: absolute; bottom: 700px; right: -20px;
      font-size: 380px; font-weight: 700; color: rgba(91,33,182,0.05);
      line-height: 1; letter-spacing: -0.05em; user-select: none;
    }

    .content {
      position: absolute; top: 0; left: 80px; right: 80px; bottom: 640px;
      display: flex; flex-direction: column; align-items: flex-start;
      justify-content: center; padding: 140px 0 60px;
    }

    .nicho {
      font-size: 18px; font-weight: 700; color: #5B21B6;
      letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 56px;
    }

    /* Grande número como gancho visual */
    .big-8 {
      font-size: 200px; font-weight: 700; line-height: 0.85;
      color: #5B21B6; font-family: 'Playfair Display', serif;
      margin-bottom: 16px;
    }
    .big-8-label {
      font-size: 28px; font-weight: 300; color: rgba(0,0,0,0.4);
      margin-bottom: 60px;
    }

    .headline {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-weight: 700; color: #1a1a1a;
      line-height: 1.1; margin-bottom: 16px;
    }
    .headline-italic {
      font-family: 'Playfair Display', serif;
      font-size: 72px; font-style: italic; color: #5B21B6;
      line-height: 1.1; margin-bottom: 56px;
    }

    .body { font-size: 28px; font-weight: 300; color: rgba(0,0,0,0.45); line-height: 1.6; margin-bottom: 72px; max-width: 840px; }

    .separator { width: 60px; height: 3px; background: #5B21B6; margin-bottom: 48px; }

    .price { font-size: 108px; font-weight: 700; color: #5B21B6; line-height: 1; letter-spacing: -0.03em; margin-bottom: 12px; }
    .price-installment { font-size: 26px; color: rgba(0,0,0,0.3); margin-bottom: 64px; }

    .cta {
      background: #5B21B6; color: #ffffff;
      font-size: 34px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 32px 80px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="corner-block"></div>
  <div class="deco-num">67</div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="big-8">8</div>
    <div class="big-8-label">minutos. É tudo que você precisa.</div>
    <div class="headline">Venda sua mentoria</div>
    <div class="headline-italic">por R$2.997</div>
    <p class="body">Organize seu conhecimento, crie seu produto e comece a vender ainda hoje.</p>
    <div class="separator"></div>
    <div class="price">{{PRICE}}</div>
    <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
