<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=1080" />
  <title>Checklist Dark</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:1080px;height:1920px;overflow:hidden;background:#09080A;font-family:'DM Sans',sans-serif}
    .bg{position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 50% 30%,rgba(201,168,76,0.10) 0%,transparent 65%),#09080A}
    .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px 200px}
    .rule{position:absolute;top:178px;left:80px;right:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.3) 40%,transparent)}
    .content{position:absolute;top:200px;left:80px;right:80px;bottom:690px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:40px 0}
    .nicho{font-size:18px;font-weight:700;color:#C9A84C;letter-spacing:.35em;text-transform:uppercase;margin-bottom:36px}
    .lead{font-size:28px;font-weight:300;color:rgba(255,255,255,.45);margin-bottom:20px}
    .h1{font-family:'Playfair Display',serif;font-size:78px;font-weight:700;color:#fff;line-height:1.02;margin-bottom:8px}
    .h2{font-family:'Playfair Display',serif;font-size:78px;font-style:italic;color:#C9A84C;line-height:1.02;margin-bottom:52px}
    /* Checklist */
    .list{display:flex;flex-direction:column;gap:0;margin-bottom:56px;width:100%}
    .item{display:flex;align-items:center;gap:24px;padding:22px 32px;border-bottom:1px solid rgba(255,255,255,.05)}
    .item:first-child{border-top:1px solid rgba(255,255,255,.05)}
    .i-check{width:36px;height:36px;border-radius:50%;border:1.5px solid #C9A84C;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .i-label{font-size:28px;font-weight:400;color:rgba(255,255,255,.75)}
    .i-sub{font-size:20px;font-weight:300;color:rgba(255,255,255,.3);margin-left:auto}
    .price{font-size:108px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.03em;margin-bottom:10px}
    .inst{font-size:26px;color:rgba(255,255,255,.28);margin-bottom:48px}
    .cta{background:#C9A84C;color:#09080A;font-size:34px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:30px 80px;border-radius:4px}
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div><div class="grain"></div><div class="rule"></div>
  <div class="content">
    <div class="nicho">{{NICHO}}</div>
    <div class="lead">ainda sem saber por onde começar?</div>
    <div class="h1">O Agente Arquiteto</div>
    <div class="h2">define tudo por você</div>
    <div class="list">
      <div class="item">
        <div class="i-check"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 13L15 5" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="i-label">Nome da sua mentoria</span>
        <span class="i-sub">identidade</span>
      </div>
      <div class="item">
        <div class="i-check"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 13L15 5" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="i-label">Cronograma de aulas</span>
        <span class="i-sub">estrutura</span>
      </div>
      <div class="item">
        <div class="i-check"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 13L15 5" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="i-label">Precificação</span>
        <span class="i-sub">R$2.997</span>
      </div>
      <div class="item">
        <div class="i-check"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L7 13L15 5" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="i-label">Proposta pública</span>
        <span class="i-sub">posicionamento</span>
      </div>
    </div>
    <div class="price">{{PRICE}}</div>
    <div class="inst">{{PRICE_INSTALLMENT}}</div>
    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
