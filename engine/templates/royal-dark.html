<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Royal Dark</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0a0612; font-family: 'DM Sans', sans-serif; }

    .bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 700px 500px at 50% 30%, rgba(100,40,180,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 500px 300px at 20% 80%, rgba(80,20,140,0.08) 0%, transparent 50%),
        #0a0612;
    }

    /* Bordas decorativas nos cantos */
    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: absolute; width: 60px; height: 60px;
    }
    .corner-tl { top: 80px; left: 80px; border-top: 2px solid rgba(140,80,255,0.4); border-left: 2px solid rgba(140,80,255,0.4); }
    .corner-tr { top: 80px; right: 80px; border-top: 2px solid rgba(140,80,255,0.4); border-right: 2px solid rgba(140,80,255,0.4); }
    .corner-bl { top: 1180px; left: 80px; border-bottom: 2px solid rgba(140,80,255,0.4); border-left: 2px solid rgba(140,80,255,0.4); }
    .corner-br { top: 1180px; right: 80px; border-bottom: 2px solid rgba(140,80,255,0.4); border-right: 2px solid rgba(140,80,255,0.4); }

    .content {
      position: absolute; top: 0; left: 80px; right: 80px; bottom: 640px;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 140px 60px 60px;
    }

    .icon-wrap { margin-bottom: 60px; }

    .nicho {
      font-size: 20px; font-weight: 500; color: rgba(160,100,255,0.8);
      letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 48px;
    }

    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 82px; font-weight: 700; color: #ffffff;
      line-height: 1.1; margin-bottom: 40px;
    }

    .subheadline {
      font-size: 36px; font-weight: 300; color: rgba(200,160,255,0.7);
      line-height: 1.4; margin-bottom: 72px; max-width: 800px;
    }

    .price-wrapper {
      position: relative; margin-bottom: 72px;
    }

    .price-glow {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 400px; height: 200px;
      background: radial-gradient(ellipse, rgba(120,60,255,0.25) 0%, transparent 70%);
      filter: blur(30px);
    }

    .price {
      position: relative;
      font-size: 112px; font-weight: 700;
      background: linear-gradient(135deg, #a060ff, #d4a0ff, #a060ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1; letter-spacing: -0.02em;
    }

    .price-installment {
      font-size: 28px; color: rgba(255,255,255,0.3); margin-top: 12px;
    }

    .cta {
      background: linear-gradient(135deg, #7030d0, #9050f0);
      color: #ffffff; font-size: 38px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 36px 88px; border-radius: 6px;
      box-shadow: 0 0 60px rgba(120,60,255,0.35);
    }
  
    /* === REGRAS ANTI-QUEBRA (global) === */
    /* Preços e valores monetários nunca quebram linha */
    .price,.inst,.price-installment,.vr-num,.sr-val,.badge-price,
    .start,.start span,.value,.value-row,.vr-label+.vr-num,
    .accent-text,.price-row,.price-wrapper .price,
    .cta-text,.note,.start-note,.hero-value {
      white-space: nowrap;
    }
    /* Títulos sem hifenização automática */
    .headline,.subheadline,.h1,.h2,.h3,.top-h,.top-headline,
    .body,.lead,.nicho,.nicho-tag,.top-nicho,
    .accent,.sub-label,.step-row,.vr-label {
      hyphens: none;
      word-break: keep-all;
    }
    /* Garante que headline e subheadline preencham bem sem órfãos */
    .headline,.h1 { text-wrap: balance; }
    .subheadline,.body,.h2 { text-wrap: pretty; }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <!-- Ícone: coroa -->
    <div class="icon-wrap">
      <svg width="92" height="92" viewBox="0 0 92 92" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 68H80V76H12V68Z" stroke="#9050f0" stroke-width="2.5" stroke-linejoin="round" fill="rgba(144,80,240,0.1)"/>
        <path d="M12 68L20 32L38 52L46 20L54 52L72 32L80 68" stroke="#9050f0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="rgba(144,80,240,0.08)"/>
        <circle cx="20" cy="32" r="5" fill="#9050f0" opacity="0.8"/>
        <circle cx="46" cy="20" r="5" fill="#9050f0" opacity="0.8"/>
        <circle cx="72" cy="32" r="5" fill="#9050f0" opacity="0.8"/>
      </svg>
    </div>

    <div class="nicho">{{NICHO}}</div>
    <div class="headline">{{HEADLINE}}</div>
    <p class="subheadline">{{SUBHEADLINE}}</p>

    <div class="price-wrapper">
      <div class="price-glow"></div>
      <div class="price">{{PRICE}}</div>
      <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    </div>

    <div class="cta">{{CTA}}</div>
  </div>
</body>
</html>
