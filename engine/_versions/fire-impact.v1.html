<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>Fire Impact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      font-family: 'Anton', Impact, sans-serif;
    }

    /* Fundo: preto ao laranja escuro com efeito diagonal agressivo */
    .bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(160deg, #000000 0%, #1a0500 40%, #4a1000 65%, #8B2500 100%);
    }

    /* Efeito de chama: gradiente diagonal intenso */
    .flame-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 80%, rgba(255, 80, 0, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 90%, rgba(200, 40, 0, 0.2) 0%, transparent 40%);
    }

    /* Grain fotográfico */
    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* Conteúdo - safe zone: nada abaixo de 1280px */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 640px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 100px 70px 80px;
      text-align: center;
    }

    /* Tag de nicho */
    .nicho-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #FF6B1A;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* Barra de tensão acima da headline */
    .tension-bar {
      width: 200px;
      height: 6px;
      background: linear-gradient(90deg, #FF2200, #FF6B1A, #FF2200);
      margin-bottom: 32px;
      box-shadow: 0 0 20px rgba(255, 60, 0, 0.7);
    }

    /* Headline - Impact máximo */
    .headline {
      font-size: 86px;
      font-weight: 400; /* Anton já é ultra bold por padrão */
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      line-height: 1.0;
      margin-bottom: 0;
      text-shadow:
        0 0 40px rgba(255, 80, 0, 0.8),
        0 4px 0 rgba(180, 40, 0, 0.6),
        0 8px 20px rgba(0,0,0,0.5);
    }

    /* Linha de tensão embaixo da headline (sublinhado dramático) */
    .headline-underline {
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, transparent, #FF2200 20%, #FF6B1A 50%, #FF2200 80%, transparent);
      margin-top: 28px;
      margin-bottom: 48px;
      box-shadow: 0 0 16px rgba(255, 40, 0, 0.6);
    }

    /* Subheadline */
    .subheadline {
      font-family: 'DM Sans', sans-serif;
      font-size: 38px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.35;
      margin-bottom: 72px;
      max-width: 820px;
    }

    /* Bloco de preço */
    .price-block {
      margin-bottom: 64px;
    }

    .price {
      font-size: 120px;
      font-weight: 400; /* Anton */
      color: #FF6B1A;
      line-height: 1;
      text-shadow:
        0 0 50px rgba(255, 100, 0, 0.7),
        0 4px 0 #8B2500;
    }

    .price-installment {
      font-family: 'DM Sans', sans-serif;
      font-size: 32px;
      color: rgba(255,255,255,0.6);
      margin-top: 12px;
    }

    /* Botão CTA */
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #FF3300, #FF6B1A);
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 44px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 36px 80px;
      box-shadow:
        0 0 40px rgba(255, 80, 0, 0.5),
        0 8px 20px rgba(0,0,0,0.4);
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="flame-overlay"></div>
  <div class="grain"></div>

  <div class="content">
    <div class="nicho-tag">{{NICHO}}</div>
    <div class="tension-bar"></div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <div class="headline-underline"></div>
    <p class="subheadline">{{SUBHEADLINE}}</p>
    <div class="price-block">
      <div class="price">{{PRICE}}</div>
      <div class="price-installment">{{PRICE_INSTALLMENT}}</div>
    </div>
    <div class="cta-button">{{CTA}}</div>
  </div>
</body>
</html>
