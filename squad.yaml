    auto_save: true

evaluation:
  dimensions: 9
  formula: "(soma_notas x 1.111) arredondada"
  threshold_delivery: 70
  criteria:
    - clareza_mensagem
    - identificacao_publico
    - forca_promessa
    - forca_hook_verbal
    - forca_hook_visual
    - harmonia_visual
    - naturalidade_anti_ia
    - potencial_clique
    - potencial_compra

metrics:
  cpa_target: "variavel por produto"
  roas_target: 2.0
  ctr_target: 1.5
  score_minimo_entrega: 70
