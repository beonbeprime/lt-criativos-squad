pipeline:
  workflow: lt-full-pipeline
  file: workflows/lt-full-pipeline.md
  phases:
    - id: intake
      name: "Intake e Perguntas Obrigatorias"
      tasks:
        - 01-analyze-champions

    - id: memory-load
      name: "Carregar Memoria do Projeto"
      tasks: []

    - id: niche-research
      name: "Pesquisa de Nicho e Publico"
      tasks:
        - 02-extract-patterns

    - id: ingest-refs
      name: "Ingestao de Referencias"
      tasks:
        - 02-extract-patterns

    - id: intel
      name: "Analise de Campeoes"
      tasks:
        - 01-analyze-champions
        - 02-extract-patterns

    - id: message-strategy
      name: "Estrategia de Mensagem"
      tasks:
        - 12-message-strategy

    - id: strategy
      name: "Estrategia e Briefing"
      tasks:
        - 03-create-briefing
        - 04-write-copy

    - id: copy-gen
      name: "Geracao de Copy 3x Volume"
      tasks:
        - 04-write-copy
        - 14-3x-internal-generation

    - id: visual-dir
      name: "Direcao Visual"
      tasks:
        - 13-visual-direction

    - id: production
      name: "Producao Lovart"
      tasks:
        - 05-create-lovart-prompts
        - 06-validate-prompts
        - 07-generate-images

    - id: code-render
      name: "Renderizacao HTML via Playwright"
      tasks: []

    - id: review
      name: "Revisao e Safe Zone"
      tasks:
        - 08-analyze-images
        - 09-safe-zone-check

    - id: evaluate
      name: "Avaliacao 0-100 por 9 Criterios"
      tasks:
        - 15-rank-and-select

    - id: rank-select
      name: "Ranking e Selecao dos Melhores"
      tasks:
        - 15-rank-and-select

    - id: deliver
      name: "Entrega e Atualizacao de Memoria"
      tasks:
        - 10-crop-to-feed
        - 11-package-delivery

capabilities:
  analyze_champions: true
  extract_visual_patterns: true
  extract_copy_patterns: true
  create_briefings: true
  write_copy_variations: true
  generate_lovart_prompts: true
  safe_zone_audit: true
  intelligent_crop_feed: true
  batch_delivery: true
  evolutionary_memory: true
  multi_product: true
  multi_niche: true
  code_mode_render: true
  demand_classification: true
  resource_optimization: true
  score_9_dimensions: true
  internal_3x_generation: true

disabled_capabilities:
  auto_generate_on_schedule: false
  auto_upload_meta_ads: false
  auto_ab_test: false

deliverables:
  formats:
    story:
      dimensions: "1080x1920"
      ratio: "9:16 vertical"
      safe_zone: "terco inferior livre (Y > 1280)"
    feed:
      dimensions: "1350x1080"
      crop_method: "inteligente - detecta rosto e elementos"
  generation_rule: "gerar 3x internamente, entregar os melhores"
  score_threshold: 70
  per_batch:
    criativos: "variavel (conforme briefing)"
    formatos_por_criativo: 2
    relatorio: "sim - com notas e ranking"

champion_references:
  folder_validados: "C:/Users/Pichau/Desktop/Validados/"
  folder_criativos_validados: "C:/Users/Pichau/Desktop/Criativos Validados/"
  champion_subfolder: "C:/Users/Pichau/Desktop/Criativos Validados/campecao/"
  data_file: data/champion-patterns.yaml

integrations:
  lovart_py:
    project: "C:/Users/Pichau/Desktop/aios/lovart-py/"
    always_use_reference: true
  engine:
    path: "engine/"
    renderer: "engine/renderer.js"
    templates: "engine/templates/"
  copy_killer:
    mode_auto: true
    mode_zero: true
    mode_adapt: true
  meta_ads:
    account: "act_1255873236232349"
