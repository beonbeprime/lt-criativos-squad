id: lt-criativos
name: "Low Ticket Creative Squad (Zeuz)"
version: "2.0.0"
description: |
  Squad especializado em criacao de criativos de alta conversao para produtos low ticket.
  Multi-produto, multi-nicho. Aceita qualquer segmento e preco entre R$9 e R$297.
  Opera em 8 camadas com 70 agentes, motor HTML+Playwright, memoria evolutiva e
  geracao interna 3x com selecao dos melhores para entrega.
author: "Allysson Silveira / Synkra AIOS"
category: creative-production

tags:
  - low-ticket
  - criativos
  - ads
  - copy
  - lovart
  - playwright
  - meta-ads
  - multi-produto
  - multi-nicho

